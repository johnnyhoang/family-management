services:
  db:
    image: mysql:8.0
    container_name: family_mgmt_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: family_mgmt
      MYSQL_USER: family_mgmt
      MYSQL_PASSWORD: family_mgmt
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: family_mgmt_server
    restart: always
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=family_mgmt
      - DB_PASSWORD=family_mgmt
      - DB_DATABASE=family_mgmt
      - JWT_SECRET=your_super_secret_jwt_key
      - FRONTEND_URL=http://localhost:5173
    ports:
      - "3173:8080"
    depends_on:
      - db

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3173/api/v1
    container_name: family_mgmt_web
    restart: always
    ports:
      - "5173:8080"
    depends_on:
      - server

volumes:
  mysql_data:
